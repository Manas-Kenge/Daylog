# Daylog bundled binaries + GNOME extension — pinned versions and SHA-256
# checksums.
#
# Format: <component>\t<version>\t<target>\t<archive-sha256>
# Bump via:  scripts/bump-binary.sh <component> <new-version>
# Verify via: scripts/fetch-binaries.sh
#
# Sources:
#   aw-server-rust                       → extracted from the
#                                          ActivityWatch/activitywatch parent
#                                          bundle zip (the upstream
#                                          aw-server-rust repo has no own
#                                          releases at this time)
#   aw-awatcher                          → 2e3s/awatcher release zip
#   focused-window-dbus@flexagoon.com    → extensions.gnome.org. Only needed
#                                          on GNOME-Wayland sessions; bundled
#                                          and extracted at first launch when
#                                          the wizard detects that case.
#                                          "version" is the pk download tag,
#                                          not a semver. Renovate does not
#                                          auto-track this; bump manually.
#
# v0.1 is x86_64-linux only for the binaries — neither upstream publishes
# aarch64 release artifacts. aarch64 is a v0.2 goal that requires building
# from source. The GNOME extension is JS, so it's `noarch`.

