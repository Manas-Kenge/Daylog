name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel in-flight runs of the same branch when new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo build (release)
        run: cargo build --release -p daylog-tui

      - name: smoke — daylog --help
        run: target/release/daylog --help

      - name: smoke — daylog --version
        run: target/release/daylog --version
