name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Allow manual triggering of the build path without minting a release.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build a stripped-and-tarred Linux x86_64 binary. Cross-platform builds
  # are out of scope for v0.1 — the wizard's tracker installer is Linux-only.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo build (release)
        run: cargo build --release --locked -p daylog-tui

      - name: Strip
        run: strip target/release/daylog

      - name: smoke — daylog --help
        run: target/release/daylog --help

      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          NAME="daylog-${VERSION}-x86_64-unknown-linux-gnu"
          mkdir -p dist
          tar -czf "dist/${NAME}.tar.gz" -C target/release daylog
          echo "tarball=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: tarball
          path: dist/*.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to crates.io. Triggers on tag push only. daylog-core publishes
  # first; daylog-tui is gated on it. Both are one-way doors — yank ≠ delete.
  # ---------------------------------------------------------------------------
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo publish daylog-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-core --locked

      # Index propagation takes 30–90s. Poll until daylog-core resolves
      # before publishing daylog-tui (which depends on it).
      - name: Wait for daylog-core on the index
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if cargo search daylog-core | grep -q '^daylog-core ='; then
              echo "daylog-core visible on the index"
              exit 0
            fi
            echo "  waiting (attempt $i/30)…"
            sleep 5
          done
          echo "daylog-core never appeared on the index" >&2
          exit 1

      - name: cargo publish daylog-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-tui --locked

  # ---------------------------------------------------------------------------
  # Cut the GitHub Release. Tag push only. Attaches the tarball produced by
  # `build`. Gated on `publish` so a crates.io failure pulls the GitHub
  # Release with it (no half-published versions).
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: [build, publish]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: tarball
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
