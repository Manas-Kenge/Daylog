name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # Linux-only by design: the wizard's tracker installer assumes systemd/XDG.
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .

      - name: cargo build (release)
        run: cargo build --release --locked -p daylog-tui

      - name: Strip
        run: strip target/release/daylog

      - name: smoke — daylog --help
        run: target/release/daylog --help

      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          NAME="daylog-${VERSION}-x86_64-unknown-linux-gnu"
          STABLE="daylog-x86_64-unknown-linux-gnu"
          mkdir -p dist
          tar -czf "dist/${NAME}.tar.gz" -C target/release daylog
          # Stable-named copy keeps releases/latest/download/<name> resolving.
          cp "dist/${NAME}.tar.gz" "dist/${STABLE}.tar.gz"
          echo "tarball=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 15
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .

      - name: cargo publish daylog-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-tui --locked

  # Gated on `publish` so a crates.io failure aborts the GitHub Release too —
  # no half-published versions where the tarball ships but the crate doesn't.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: [build, publish]
    timeout-minutes: 5
    permissions:
      contents: write  # softprops/action-gh-release + generate_release_notes need it
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true

  # AUR (`daylog-bin`) lives at aur.archlinux.org/daylog-bin.git, a separate
  # git host. Push happens after the GitHub Release exists so the PKGBUILD's
  # source URLs resolve when AUR users build.
  aur-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: [build, release]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: dist/

      - name: Resolve version + tarball sha256
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="daylog-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          SHA256=$(awk -v t="$TARBALL" '$2 == t { print $1 }' dist/checksums.txt)
          if [ -z "$SHA256" ]; then
            echo "Could not find sha256 for $TARBALL in checksums.txt" >&2
            cat dist/checksums.txt >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Configure SSH for AUR
        run: |
          set -euo pipefail
          install -d -m 700 ~/.ssh
          install -m 600 /dev/stdin ~/.ssh/aur <<<"${{ secrets.AUR_SSH_PRIVATE_KEY }}"
          ssh-keyscan -t ed25519,rsa,ecdsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update PKGBUILD + regenerate .SRCINFO + push to AUR
        env:
          GIT_SSH_COMMAND: 'ssh -i ~/.ssh/aur -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes'
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          set -euo pipefail
          git clone ssh://aur@aur.archlinux.org/daylog-bin.git aur-repo
          cp packaging/aur/PKGBUILD aur-repo/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur-repo/PKGBUILD
          # Replace only the first hex sha256 entry; the other two are 'SKIP'.
          sed -i "0,/^    '[a-f0-9]\{64\}'/{s//    '${SHA256}'/}" aur-repo/PKGBUILD
          # makepkg refuses to run as root, so create a builder user inside the
          # Arch container. --printsrcinfo only reads PKGBUILD; no network.
          # UID 1001 matches the GitHub runner user so .SRCINFO ownership lines
          # up on the host — no post-docker chown dance.
          docker run --rm -v "$PWD/aur-repo:/pkg" -w /pkg archlinux:base-devel bash -c '
            useradd -m -u 1001 builder &&
            chown -R builder /pkg &&
            su builder -c "makepkg --printsrcinfo > .SRCINFO"
          '
          cd aur-repo
          git config user.name "Manas Kenge"
          git config user.email "Manas-Kenge@users.noreply.github.com"
          if git diff --quiet PKGBUILD .SRCINFO; then
            echo "AUR repo already at v${VERSION} — nothing to push"
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push
