name: Release

on:
  push:
    tags:
      - "v*.*.*"
  # Allow manual triggering of the build path without minting a release.
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build a stripped-and-tarred Linux x86_64 binary. Cross-platform builds
  # are out of scope for v0.1 — the wizard's tracker installer is Linux-only.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo build (release)
        run: cargo build --release --locked -p daylog-tui

      - name: Strip
        run: strip target/release/daylog

      - name: smoke — daylog --help
        run: target/release/daylog --help

      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          NAME="daylog-${VERSION}-x86_64-unknown-linux-gnu"
          STABLE="daylog-x86_64-unknown-linux-gnu"
          mkdir -p dist
          tar -czf "dist/${NAME}.tar.gz" -C target/release daylog
          # Stable-named copy so README's releases/latest/download/<name> URL
          # keeps resolving across versions.
          cp "dist/${NAME}.tar.gz" "dist/${STABLE}.tar.gz"
          echo "tarball=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      # cargo-deb + cargo-generate-rpm read [package.metadata.*] in
      # crates/daylog/Cargo.toml. Prebuilt binaries via taiki-e/install-action
      # keep this step at ~10s instead of a 2-min cargo-install rebuild.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build .deb
        run: cargo deb -p daylog-tui --no-build --no-strip

      - name: Build .rpm
        run: cargo generate-rpm -p crates/daylog

      - name: Collect Linux packages into dist/
        run: |
          set -euo pipefail
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to crates.io. Triggers on tag push only. daylog-core publishes
  # first; daylog-tui is gated on it. Both are one-way doors — yank ≠ delete.
  # ---------------------------------------------------------------------------
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: cargo publish daylog-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-core --locked

      # Poll the sparse index for the exact version we just published.
      # `cargo search` hits a separate, lagging search index — don't use it.
      - name: Wait for daylog-core on the index
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${REF_NAME#v}"
          URL="https://index.crates.io/da/yl/daylog-core"
          for i in $(seq 1 60); do
            if curl -sf "$URL" | grep -q "\"vers\":\"${VER}\""; then
              echo "daylog-core ${VER} visible on the sparse index"
              exit 0
            fi
            echo "  waiting (attempt $i/60)…"
            sleep 5
          done
          echo "daylog-core ${VER} never appeared on the sparse index" >&2
          exit 1

      - name: cargo publish daylog-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-tui --locked

  # ---------------------------------------------------------------------------
  # Cut the GitHub Release. Tag push only. Attaches the tarball produced by
  # `build`. Gated on `publish` so a crates.io failure pulls the GitHub
  # Release with it (no half-published versions).
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: [build, publish]
    timeout-minutes: 5
    # contents: write is required by softprops/action-gh-release to create
    # the release AND by generate_release_notes to query the compare API.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
          fail_on_unmatched_files: true
          generate_release_notes: true
