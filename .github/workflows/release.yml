name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  # Linux-only by design: the wizard's tracker installer assumes systemd/XDG.
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    outputs:
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .

      - name: cargo build (release)
        run: cargo build --release --locked -p daylog-tui

      - name: Strip
        run: strip target/release/daylog

      - name: smoke — daylog --help
        run: target/release/daylog --help

      - name: Pack tarball
        id: pack
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          NAME="daylog-${VERSION}-x86_64-unknown-linux-gnu"
          STABLE="daylog-x86_64-unknown-linux-gnu"
          mkdir -p dist
          tar -czf "dist/${NAME}.tar.gz" -C target/release daylog
          # Stable-named copy keeps releases/latest/download/<name> resolving.
          cp "dist/${NAME}.tar.gz" "dist/${STABLE}.tar.gz"
          echo "tarball=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          ls -lh dist/

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: build
    timeout-minutes: 15
    environment: crates-io
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .

      - name: cargo publish daylog-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p daylog-tui --locked

  # Gated on `publish` so a crates.io failure aborts the GitHub Release too —
  # no half-published versions where the tarball ships but the crate doesn't.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    needs: [build, publish]
    timeout-minutes: 5
    permissions:
      contents: write  # softprops/action-gh-release + generate_release_notes need it
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-artifacts
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
